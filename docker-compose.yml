services:
  redis:
    image: redis:7-alpine
    container_name: restoran-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: restoran-api
    env_file:
      - ./apps/api/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=4000
    ports:
      - "4000:4000"
    depends_on:
      - redis
